name: Manual Run with Parameters

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Repository name"
        required: true
        type: string

      issue:
        description: "GitHub issue number"
        required: true
        type: string

      pull_request:
        description: "Pull request number"
        required: true
        type: string

jobs:
  run-job:
    runs-on: ubuntu-latest

    steps:
      - name: Show inputs
        run: |
          echo "Repository: ${{ github.event.inputs.repository }}"
          echo "Issue: ${{ github.event.inputs.issue }}"
          echo "Pull Request: ${{ github.event.inputs.pull_request }}"
