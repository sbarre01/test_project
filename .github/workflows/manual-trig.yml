name: CMF Manual CI Trigger

on:
  workflow_dispatch:
    inputs:
      GERRIT_TOPIC:
        description: "[Gerrit] Changesets of the Gerrit topic to be downloaded (no spaces allowed)"
        required: false
        type: string

      GERRIT_CHANGE_NUMBERS:
        description: "[Gerrit] List of Change numbers, separated by commas or spaces, for layer builds"
        required: false
        type: string

      GITHUB_PR_LIST:
        description: "[GitHub] List of PRs in owner/repo/pull/number or owner/repo/pulls/number format"
        required: false
        type: string

      GITHUB_ISSUE:
        description: "[GitHub] Issue with associated PRs in owner/repo/issues/number format"
        required: false
        type: string

      GITHUB_META_LAYER:
        description: "[GitHub] Meta layer to fetch in owner/repo format (must not be in GITHUB_PR_LIST, only one allowed)"
        required: false
        type: string

      GITHUB_META_LAYER_BRANCH:
        description: "[GitHub] Branch of the meta layer (required when GITHUB_META_LAYER is set)"
        required: false
        type: string

jobs:
  run-job:
    runs-on: ubuntu-latest

    steps:
      - name: Validate at least one input is provided
        env:
          INPUT_GERRIT_TOPIC: ${{ github.event.inputs.GERRIT_TOPIC }}
          INPUT_GERRIT_CHANGE_NUMBERS: ${{ github.event.inputs.GERRIT_CHANGE_NUMBERS }}
          INPUT_GITHUB_PR_LIST: ${{ github.event.inputs.GITHUB_PR_LIST }}
          INPUT_GITHUB_ISSUE: ${{ github.event.inputs.GITHUB_ISSUE }}
          INPUT_GITHUB_META_LAYER: ${{ github.event.inputs.GITHUB_META_LAYER }}
        run: |
          if [[ -z "$INPUT_GERRIT_TOPIC" && -z "$INPUT_GERRIT_CHANGE_NUMBERS" && \
                -z "$INPUT_GITHUB_PR_LIST" && -z "$INPUT_GITHUB_ISSUE" && \
                -z "$INPUT_GITHUB_META_LAYER" ]]; then
            echo "::error::At least one input must be provided"
            exit 1
          fi

      - name: Validate GERRIT_TOPIC has no spaces
        if: ${{ github.event.inputs.GERRIT_TOPIC != '' }}
        env:
          INPUT_GERRIT_TOPIC: ${{ github.event.inputs.GERRIT_TOPIC }}
        run: |
          if [[ "$INPUT_GERRIT_TOPIC" =~ [[:space:]] ]]; then
            echo "::error::GERRIT_TOPIC must not contain spaces. Got: $INPUT_GERRIT_TOPIC"
            exit 1
          fi
          echo "GERRIT_TOPIC is valid: $INPUT_GERRIT_TOPIC"

      - name: Validate GITHUB_ISSUE exists
        if: ${{ github.event.inputs.GITHUB_ISSUE != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_GITHUB_ISSUE: ${{ github.event.inputs.GITHUB_ISSUE }}
        run: |
          # Expected format: owner/repo/issues/number
          REPO=$(echo "$INPUT_GITHUB_ISSUE" | sed 's|/issues/[0-9]*$||')
          NUMBER=$(echo "$INPUT_GITHUB_ISSUE" | grep -oE '[0-9]+$')
          if [[ -z "$REPO" || -z "$NUMBER" || ! "$REPO" =~ ^[^/]+/[^/]+$ ]]; then
            echo "::error::GITHUB_ISSUE must be in owner/repo/issues/number format (e.g. rdkcentral/sample-gitflow/issues/47). Got: $INPUT_GITHUB_ISSUE"
            exit 1
          fi
          HTTP_STATUS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/$REPO/issues/$NUMBER" \
            --silent --include 2>&1 | head -1 | awk '{print $2}')
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Issue $INPUT_GITHUB_ISSUE does not exist (HTTP $HTTP_STATUS)"
            exit 1
          fi
          echo "Issue $INPUT_GITHUB_ISSUE exists."

      - name: Validate GITHUB_PR_LIST entries exist
        if: ${{ github.event.inputs.GITHUB_PR_LIST != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_GITHUB_PR_LIST: ${{ github.event.inputs.GITHUB_PR_LIST }}
        run: |
          # Replace commas with spaces and iterate
          # Accepts both owner/repo/pull/number and owner/repo/pulls/number formats
          for PR in $(echo "$INPUT_GITHUB_PR_LIST" | tr ',' ' '); do
            REPO=$(echo "$PR" | sed -E 's|/pulls?/[0-9]+$||')
            NUMBER=$(echo "$PR" | grep -oE '[0-9]+$')
            if [[ -z "$REPO" || -z "$NUMBER" || ! "$REPO" =~ ^[^/]+/[^/]+$ ]]; then
              echo "::error::Each PR must be in owner/repo/pull(s)/number format. Got: $PR"
              exit 1
            fi
            HTTP_STATUS=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "repos/$REPO/pulls/$NUMBER" \
              --silent --include 2>&1 | head -1 | awk '{print $2}')
            if [ "$HTTP_STATUS" != "200" ]; then
              echo "::error::Pull request $PR does not exist (HTTP $HTTP_STATUS)"
              exit 1
            fi
            echo "Pull request $PR exists."
          done

      - name: Validate GITHUB_META_LAYER inputs
        if: ${{ github.event.inputs.GITHUB_META_LAYER != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_GITHUB_META_LAYER: ${{ github.event.inputs.GITHUB_META_LAYER }}
          INPUT_GITHUB_META_LAYER_BRANCH: ${{ github.event.inputs.GITHUB_META_LAYER_BRANCH }}
        run: |
          if [[ ! "$INPUT_GITHUB_META_LAYER" =~ ^[^/]+/[^/]+$ ]]; then
            echo "::error::GITHUB_META_LAYER must be in owner/repo format. Got: $INPUT_GITHUB_META_LAYER"
            exit 1
          fi
          if [[ -z "$INPUT_GITHUB_META_LAYER_BRANCH" ]]; then
            echo "::error::GITHUB_META_LAYER_BRANCH is required when GITHUB_META_LAYER is set"
            exit 1
          fi
          # Validate the repo exists
          HTTP_STATUS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/$INPUT_GITHUB_META_LAYER" \
            --silent --include 2>&1 | head -1 | awk '{print $2}')
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Repository $INPUT_GITHUB_META_LAYER does not exist (HTTP $HTTP_STATUS)"
            exit 1
          fi
          echo "Repository $INPUT_GITHUB_META_LAYER exists."
          # Validate the branch exists
          ENCODED_BRANCH=$(printf '%s' "$INPUT_GITHUB_META_LAYER_BRANCH" | jq -sRr @uri)
          HTTP_STATUS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/$INPUT_GITHUB_META_LAYER/branches/$ENCODED_BRANCH" \
            --silent --include 2>&1 | head -1 | awk '{print $2}')
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Branch $INPUT_GITHUB_META_LAYER_BRANCH does not exist in $INPUT_GITHUB_META_LAYER (HTTP $HTTP_STATUS)"
            exit 1
          fi
          echo "Branch $INPUT_GITHUB_META_LAYER_BRANCH exists in $INPUT_GITHUB_META_LAYER."

      - name: Trigger Jenkins build
        env:
          HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
          API_GATEWAY_URL: ${{ vars.API_GATEWAY_URL }}
          INPUT_GERRIT_TOPIC: ${{ github.event.inputs.GERRIT_TOPIC }}
          INPUT_GERRIT_CHANGE_NUMBERS: ${{ github.event.inputs.GERRIT_CHANGE_NUMBERS }}
          INPUT_GITHUB_PR_LIST: ${{ github.event.inputs.GITHUB_PR_LIST }}
          INPUT_GITHUB_ISSUE: ${{ github.event.inputs.GITHUB_ISSUE }}
          INPUT_GITHUB_META_LAYER: ${{ github.event.inputs.GITHUB_META_LAYER }}
          INPUT_GITHUB_META_LAYER_BRANCH: ${{ github.event.inputs.GITHUB_META_LAYER_BRANCH }}
        run: |
          PAYLOAD=$(jq -n \
            --arg gerrit_topic "$INPUT_GERRIT_TOPIC" \
            --arg gerrit_changes "$INPUT_GERRIT_CHANGE_NUMBERS" \
            --arg pr_list "$INPUT_GITHUB_PR_LIST" \
            --arg issue "$INPUT_GITHUB_ISSUE" \
            --arg meta_layer "$INPUT_GITHUB_META_LAYER" \
            --arg meta_branch "$INPUT_GITHUB_META_LAYER_BRANCH" \
            '{
              GERRIT_TOPIC: $gerrit_topic,
              GERRIT_CHANGE_NUMBERS: $gerrit_changes,
              GITHUB_PR_LIST: $pr_list,
              GITHUB_ISSUE: $issue,
              GITHUB_META_LAYER: $meta_layer,
              GITHUB_META_LAYER_BRANCH: $meta_branch
            }')
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$HMAC_SECRET" | awk '{print $NF}')
          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "$API_GATEWAY_URL" \
            -H "Content-Type: application/json" \
            -H "X-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD")
          echo "Response: $(cat /tmp/response.json)"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::API Gateway returned HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Jenkins build triggered successfully."
